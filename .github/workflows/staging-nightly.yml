name: Nightly staging build

on:
  schedule:
    # Temporary scheduled test: 18:37 UTC on Friday, July 17, 2026.
    - cron: '37 18 * * *'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/kyt-seo
  STAGING_REF: staging/codex-prod-align
  DEPLOY_HOST: 100.90.161.78

jobs:
  build-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.STAGING_REF }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.deploy
          platforms: linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            NEXT_PUBLIC_PAYPAL_CLIENT_ID=${{ secrets.PAYPAL_CLIENT_ID }}
            PAYPAL_CLIENT_ID=${{ secrets.PAYPAL_CLIENT_ID }}
            PAYPAL_CLIENT_SECRET=${{ secrets.PAYPAL_CLIENT_SECRET }}
          tags: |
            ${{ env.IMAGE }}:staging-latest
            ${{ env.IMAGE }}:staging-nightly
            ${{ env.IMAGE }}:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          ping: 100.90.161.78

      - name: Deploy staging to vrouwtje
        env:
          DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          SHA: ${{ github.sha }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              vik@${{ env.DEPLOY_HOST }} \
            "set -e
             docker pull ${{ env.IMAGE }}:${SHA}
             docker stop kyt-seo-staging || true
             docker rm kyt-seo-staging || true
             docker run -d \
               --name kyt-seo-staging \
               --init \
               --restart unless-stopped \
               --no-healthcheck \
               -p 3011:3000 \
               --env-file /home/vik/docker/kyt-seo/.env.local \
               ${{ env.IMAGE }}:${SHA}
             docker tag ${{ env.IMAGE }}:${SHA} kyt-seo-staging:nightly"

      - name: Smoke test staging
        env:
          DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          sleep 20
          STAGING_STATUS=$(ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no vik@${{ env.DEPLOY_HOST }} "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3011/")
          echo "Staging HTTP $STAGING_STATUS"
          rm /tmp/deploy_key
          [ "$STAGING_STATUS" = "200" ] || (echo "Staging smoke test failed: HTTP $STAGING_STATUS" && exit 1)
